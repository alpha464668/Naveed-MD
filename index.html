<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naveed MD Pair Code</title>

<style>

body{
background:#0b141a;
font-family:Arial;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#202c33;
padding:30px;
border-radius:12px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:15px;
font-size:18px;
}

button{
margin-top:20px;
padding:12px;
width:100%;
font-size:18px;
background:#25D366;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#25D366;
}

</style>

</head>

<body>

<div class="box">

<h2>🤖 Naveed MD</h2>

<p>Public Pair Code Generator</p>

<input
id="number"
placeholder="92xxxxxxxxxx">

<button onclick="pair()">

Generate Pair Code

</button>

<div id="result"></div>

</div>

<script>

async function pair(){

let number=document.getElementById("number").value;

let res=await fetch("/pair",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

number:number

})

});

let data=await res.json();

if(data.code){

document.getElementById("result").innerHTML=data.code;

}else{

document.getElementById("result").innerHTML=data.error;

}

}

</script>

</body>
</html>
